<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <title>Change Password - Student Portal</title>
</head>

<body>

    <div class="containor animate__animated animate__fadeIn" id="changePasswordSection">
        <h1>Set New Password</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            CNIC iS your default password. Please change it to access the dashboard.
        </p>

        <label for="newPass">New Password:</label>
        <input type="password" id="newPass" placeholder="Enter new password (min 6 chars)">

        <label for="confirmPass">Confirm Password:</label>
        <input type="password" id="confirmPass" placeholder="Confirm your new password">

        <button id="savePassBtn" class="btn">Update Password</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 1. Data Fetch karein
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let allUser = JSON.parse(localStorage.getItem('allUser')) || [];

        if (!currentUser) {
            window.location.href = "index.html";
        }

        let savePassBtn = document.getElementById('savePassBtn');

        savePassBtn.addEventListener('click', () => {
            let newPass = document.getElementById('newPass').value.trim();
            let confirmPass = document.getElementById('confirmPass').value.trim();

            if (newPass === "" || confirmPass === "") {
                Swal.fire('Error', 'Donon fields bharna zaroori hain!', 'warning');
                return;
            }

            if (newPass.length < 6) {
                Swal.fire('Too Short', 'Password kam se kam 6 characters ka rakhein.', 'error');
                return;
            }

            if (newPass !== confirmPass) {
                Swal.fire('Mismatch', 'Passwords match nahi kar rahe!', 'error');
                return;
            }

            let userIndex = allUser.findIndex(u => u.cnic === currentUser.cnic);

            if (userIndex !== -1) {

                allUser[userIndex].password = newPass;
                allUser[userIndex].isPasswordChanged = true;

                localStorage.setItem('allUser', JSON.stringify(allUser));


                localStorage.setItem('currentUser', JSON.stringify(allUser[userIndex]));
                Swal.fire({
                    title: 'Password Updated Successfully!',
                    text: 'Your security settings have been saved. Redirecting you to the dashboard...',
                    icon: 'success',
                    timer: 2500,
                    timerProgressBar: true,
                    showConfirmButton: false,
                    allowOutsideClick: false,
                    allowEscapeKey: false
                }).then(() => {
                    window.location.href = "dashboard.html";
                });
            }
        });
    </script>
</body>

</html>
